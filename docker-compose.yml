services:
  announcer:
    image: ghcr.io/theoutdoorprogrammer/pi-announcer:latest
    container_name: pi-announcer
    restart: unless-stopped
    privileged: true
    ports:
      - "8180:8080"
    volumes:
      - voices:/data/voices
      - cache:/data/cache
    environment:
      - PULSE_SERVER=tcp:172.17.0.1:4713
      - PIPER_SPEAKER=82
      - DEFAULT_VOLUME=80
      - SILENCE_MS=1000

volumes:
  voices:
  cache:
